name: Integracion Continua

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  pruebas:

    runs-on: ubuntu-latest


    steps:

    - name: Descargar codigo
      uses: actions/checkout@v4


    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'


    - name: Instalar dependencias
      run: |
        pip install pytest


    - name: Ejecutar pruebas
      run: |
        pytest
